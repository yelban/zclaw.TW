name: Build NVS Tool

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: zclaw-nvs-tool-macos-arm64
            binary: zclaw-nvs-tool
          - os: macos-latest
            artifact: zclaw-nvs-tool-macos-x64
            binary: zclaw-nvs-tool
            python_arch: x64
            arch_prefix: arch -x86_64
          - os: ubuntu-latest
            artifact: zclaw-nvs-tool-linux-x64
            binary: zclaw-nvs-tool
          - os: windows-latest
            artifact: zclaw-nvs-tool-windows-x64
            binary: zclaw-nvs-tool.exe

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rosetta
        if: matrix.python_arch == 'x64'
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: ${{ matrix.python_arch || '' }}

      - name: Install dependencies
        run: |
          ${{ matrix.arch_prefix }} pip install --upgrade pip
          ${{ matrix.arch_prefix }} pip install "esptool>=4.7" "esp-idf-nvs-partition-gen>=0.1.2" "pyinstaller>=6.0"

      - name: Build binary
        run: |
          ${{ matrix.arch_prefix }} pyinstaller \
            --onefile \
            --name "zclaw-nvs-tool" \
            --distpath dist \
            --workpath build/nvs-tool \
            --specpath build/nvs-tool \
            --collect-data esptool \
            --collect-data espefuse \
            --clean \
            --noconfirm \
            scripts/zclaw-nvs-tool.py
        shell: bash

      - name: Smoke test
        run: ${{ matrix.arch_prefix }} ./dist/${{ matrix.binary }} --help
        shell: bash

      - name: Verify architecture
        if: runner.os == 'macOS'
        run: |
          file ./dist/${{ matrix.binary }}
          if [ "${{ matrix.python_arch }}" = "x64" ]; then
            file ./dist/${{ matrix.binary }} | grep -q "x86_64" || { echo "::error::Expected x86_64 binary but got wrong architecture"; exit 1; }
          fi
        shell: bash

      - name: Rename artifact
        run: |
          cp "dist/${{ matrix.binary }}" "dist/${{ matrix.artifact }}${{ contains(matrix.binary, '.exe') && '.exe' || '' }}"
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir -p release
          find artifacts -type f | while read f; do
            cp "$f" "release/$(basename "$f")"
          done
          ls -lh release/

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
